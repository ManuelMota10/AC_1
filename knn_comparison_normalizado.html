  td.name { text-align: left; color: var(--color-text-secondary); font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  tr:hover td { background: var(--color-background-secondary); }
  .better { color: #1D9E75; font-weight: 500; }
  .worse  { color: #D85A30; font-weight: 500; }
  .same   { color: var(--color-text-secondary); }
  .legend { display: flex; gap: 16px; margin-bottom: 12px; font-size: 12px; color: var(--color-text-secondary); }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; }
  .summary { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 8px; margin-bottom: 16px; }
  .card { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 10px 12px; }
  .card-label { font-size: 11px; color: var(--color-text-secondary); margin-bottom: 4px; }
  .card-vals { display: flex; gap: 8px; align-items: baseline; flex-wrap: wrap; }
  .card-knn { font-size: 18px; font-weight: 500; color: var(--color-text-primary); }
  .card-mod { font-size: 12px; color: var(--color-text-secondary); }
  .arrow-up { color: #1D9E75; }
  .arrow-dn { color: #D85A30; }
  .tabs { display: flex; gap: 8px; margin-bottom: 12px; }
  .tab { padding: 4px 12px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-tertiary); font-size: 12px; cursor: pointer; color: var(--color-text-secondary); background: transparent; }
  .tab.active { background: var(--color-background-secondary); color: var(--color-text-primary); font-weight: 500; }
</style>

function fmt(v){ return v.toFixed(2); }
function cls(a,b){ const d=a-b; if(Math.abs(d)<0.005) return 'same'; return d>0?'better':'worse'; }

let currentSort = 'name';

function render(){
  let sorted = [...data];
  if(currentSort==='f1diff') sorted.sort((a,b)=>(b.f1m-b.f1n)-(a.f1m-a.f1n));
  else if(currentSort==='recdiff') sorted.sort((a,b)=>(b.recm-b.recn)-(a.recm-a.recn));
  else sorted.sort((a,b)=>a.name.localeCompare(b.name));

  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  sorted.forEach(r=>{
    const f1c=cls(r.f1m,r.f1n), recc=cls(r.recm,r.recn), precc=cls(r.precm,r.precn);
    tbody.innerHTML+=`<tr>
      <td class="name" title="${r.name}">${r.name}</td>
      <td>${fmt(r.f1n)}</td>
      <td class="${f1c}">${fmt(r.f1m)}</td>
      <td>${fmt(r.recn)}</td>
      <td class="${recc}">${fmt(r.recm)}</td>
      <td>${fmt(r.precn)}</td>
      <td class="${precc}">${fmt(r.precm)}</td>
    </tr>`;
  });
}

function setSort(s, btn){
  currentSort=s;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  render();
}

const f1Better=data.filter(r=>r.f1m-r.f1n>0.005).length;
const f1Worse =data.filter(r=>r.f1n-r.f1m>0.005).length;
const avgF1n=(data.reduce((s,r)=>s+r.f1n,0)/data.length).toFixed(2);
const avgF1m=(data.reduce((s,r)=>s+r.f1m,0)/data.length).toFixed(2);
const avgRecn=(data.reduce((s,r)=>s+r.recn,0)/data.length).toFixed(2);
const avgRecm=(data.reduce((s,r)=>s+r.recm,0)/data.length).toFixed(2);

document.getElementById('summary').innerHTML=`

    <div class="card-label">F1 médio</div>
    <div class="card-vals">
      <span class="card-knn">${avgF1n}</span>
      <span class="card-mod ${parseFloat(avgF1m)>=parseFloat(avgF1n)?'arrow-up':'arrow-dn'}">${avgF1m} alt.</span>
    </div>
  </div>
  <div class="card">

    <div class="card-vals">

      <span class="card-mod arrow-up">${avgRecm} alt.</span>
    </div>
  </div>
  <div class="card">

    <div class="card-vals"><span class="card-knn better">${f1Better}</span><span class="card-mod">datasets</span></div>
  </div>
  <div class="card">
    <div class="card-label">F1 piorou</div>
    <div class="card-vals"><span class="card-knn worse">${f1Worse}</span><span class="card-mod">datasets</span></div>
  </div>
`;

render();
